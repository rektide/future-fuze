apiVersion: v1
kind: Service
metadata:
  name: db
  namespace: {{ include "hyperdx.namespace" . }}
  labels:
    {{- include "hyperdx.labels" . | nindent 4 }}
    app.kubernetes.io/component: db
spec:
  type: ClusterIP
  selector:
    {{- include "hyperdx.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: db
  ports:
    - name: mongo
      port: 27017
      targetPort: 27017
