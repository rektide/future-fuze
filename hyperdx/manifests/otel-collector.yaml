apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: hyperdx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      containers:
        - name: otel-collector
          image: docker.clickhouse.com/clickstack-otel-collector:2
          imagePullPolicy: IfNotPresent
          env:
            - name: CLICKHOUSE_ENDPOINT
              value: tcp://ch-server:9000?dial_timeout=10s
            - name: HYPERDX_OTEL_EXPORTER_CLICKHOUSE_DATABASE
              value: default
            - name: HYPERDX_LOG_LEVEL
              value: debug
            - name: OPAMP_SERVER_URL
              value: http://app:4320
            - name: HYPERDX_OTEL_EXPORTER_CREATE_LEGACY_SCHEMA
              value: "true"
          ports:
            - name: health
              containerPort: 13133
            - name: fluentd
              containerPort: 24225
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
            - name: metrics
              containerPort: 8888
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: hyperdx
spec:
  type: ClusterIP
  selector:
    app: otel-collector
  ports:
    - name: health
      port: 13133
      targetPort: 13133
    - name: fluentd
      port: 24225
      targetPort: 24225
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
    - name: metrics
      port: 8888
      targetPort: 8888
