apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: hyperdx-dev

nameSuffix: -dev

resources:
  - ../../base

commonLabels:
  environment: dev

patches:
  - target:
      kind: PersistentVolumeClaim
      name: hyperdx-db-data
    patch: |-
      - op: replace
        path: /spec/resources/requests/storage
        value: 10Gi
  - target:
      kind: PersistentVolumeClaim
      name: ch-data
    patch: |-
      - op: replace
        path: /spec/resources/requests/storage
        value: 50Gi
