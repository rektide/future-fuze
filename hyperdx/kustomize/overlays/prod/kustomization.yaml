apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: hyperdx-prod

nameSuffix: -prod

resources:
  - ../../base

commonLabels:
  environment: prod

commonAnnotations:
  owner: platform-team

patches:
  - target:
      kind: PersistentVolumeClaim
      name: hyperdx-db-data
    patch: |-
      - op: replace
        path: /spec/resources/requests/storage
        value: 100Gi
  - target:
      kind: PersistentVolumeClaim
      name: ch-data
    patch: |-
      - op: replace
        path: /spec/resources/requests/storage
        value: 500Gi
  - target:
      kind: Deployment
      name: app
    patch: |-
      - op: add
        path: /spec/replicas
        value: 3
